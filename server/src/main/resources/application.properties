server.port=9090

# ================= 数据源 =================
spring.datasource.url=jdbc:mysql://localhost:3307/coursegist_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================= 上传限制 =================
# 单个分片 5MB，这里限制的是单次请求体大小，给足冗余即可
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB

# ================= MyBatis-Plus =================
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ================= 大模型 / Embedding =================
# 前往 https://cloud.siliconflow.cn 申请自己的密钥（有免费额度）
# 注意：不要把真实密钥提交到 Git，建议改用环境变量：${SILICONFLOW_API_KEY}
ai.llm.api-key=sk-REPLACE_WITH_YOUR_OWN_KEY
ai.llm.base-url=https://api.siliconflow.cn/v1
ai.embedding.model=BAAI/bge-m3

# ================= Redis =================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# ================= MinIO 对象存储 =================
minio.endpoint=http://localhost:9000
minio.accessKey=minioadmin
minio.secretKey=minioadmin
minio.bucketName=course-videos

# ================= 本地工具链 =================
# yt-dlp 可执行文件路径（Windows 请使用正斜杠 /）
tool.ytdlp.path=D:/yt-dlp/yt-dlp.exe
# FFmpeg 所在目录
tool.ffmpeg.dir=D:/ffmpeg/bin
# 关键帧 OCR 命令，可替换为其他兼容命令行的 OCR 引擎
tool.ocr.command=tesseract

# ================= RocketMQ =================
rocketmq.name-server=127.0.0.1:9876
rocketmq.producer.group=lecture-analysis-group
rocketmq.producer.send-message-timeout=3000
